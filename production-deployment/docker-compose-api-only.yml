# =============================================================================
# LibreClinica API - Production Deployment (API + PostgreSQL Only)
# =============================================================================
# This is a SAFE, MINIMAL deployment that runs:
# 1. PostgreSQL 14 database
# 2. LibreClinica API (Node.js)
# 3. Nginx reverse proxy
#
# This configuration does NOT include LibreClinica Tomcat (SOAP is disabled).
# The API operates directly against the PostgreSQL database.
#
# Usage:
#   docker-compose -f docker-compose-api-only.yml up -d
#
# Server: AWS Lightsail 18.225.57.5 (Ohio, us-east-2a)
# =============================================================================

services:
  # ==========================================================================
  # 1. PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:14-alpine
    container_name: libreclinica_db
    restart: always
    environment:
      POSTGRES_DB: libreclinica
      POSTGRES_USER: libreclinica
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePassword123!}
      # Enable data checksums for integrity (21 CFR Part 11)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - db_backups:/backups
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible locally
    networks:
      - lc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libreclinica -d libreclinica"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================================================
  # 2. LibreClinica API (Node.js)
  # ==========================================================================
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: libreclinica-api:latest
    container_name: libreclinica_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"  # Only accessible locally (nginx proxies)
    environment:
      NODE_ENV: production
      PORT: 3000
      
      # Demo mode - set to false for production with real auth
      DEMO_MODE: "true"
      
      # Database connection (internal Docker network)
      LIBRECLINICA_DB_HOST: postgres
      LIBRECLINICA_DB_PORT: 5432
      LIBRECLINICA_DB_NAME: libreclinica
      LIBRECLINICA_DB_USER: libreclinica
      LIBRECLINICA_DB_PASSWORD: ${DB_PASSWORD:-SecurePassword123!}
      
      # Disable SOAP - use direct database access only
      DISABLE_SOAP: "true"
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-min-32-chars}
      JWT_EXPIRES_IN: 24h
      
      # CORS - allowed origins (add your frontend URLs)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://www.accuratrials.com,https://accuratrials.com,https://edc-real.vercel.app,http://localhost:4200}
      
      # Logging
      LOG_LEVEL: info
      
      # Enable features
      ENABLE_EMAIL_NOTIFICATIONS: "false"
      ENABLE_SUBJECT_TRANSFERS: "true"
      ENABLE_ECONSENT: "true"
      ENABLE_EPRO: "true"
      ENABLE_RTSM: "true"
    networks:
      - lc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ==========================================================================
  # 3. Nginx Reverse Proxy (HTTP only - add SSL with certbot)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: libreclinica_nginx
    restart: always
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx-simple.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - lc_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  db_data:
    name: libreclinica_db_data
  db_backups:
    name: libreclinica_db_backups

networks:
  lc_network:
    driver: bridge
    name: libreclinica_network
