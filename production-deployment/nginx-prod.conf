server {
    listen 80;
    listen [::]:80;
    server_name api.accuratrials.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.accuratrials.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/api.accuratrials.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.accuratrials.com/privkey.pem;

    # Strong SSL Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    # 1. LibreClinica API (Node.js)
    # CORS is handled entirely by Express middleware to avoid duplicate headers.
    # Nginx only proxies — all requests (including OPTIONS preflight) reach Express.
    # However, when Express is down (502/503/504), nginx must add CORS headers
    # itself so the browser doesn't mask the real error with a CORS rejection.
    location /api {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @api_error;
    }

    # Fallback for API errors — returns proper CORS headers so the browser
    # surfaces the real HTTP status instead of a cryptic CORS failure.
    location @api_error {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Cache-Control, If-Modified-Since, Range" always;
        return 502 '{"success":false,"error":"API server temporarily unavailable"}';
    }

    # 2. LibreClinica Core (Java) - Main Application
    location /libreclinica {
        proxy_pass http://core:8080/libreclinica;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increase timeout for heavy Java operations
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # 3. LibreClinica SOAP Web Services - CRITICAL for Part 11 compliance
    location /libreclinica-ws {
        proxy_pass http://core:8080/libreclinica-ws;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        # SOAP operations may take time
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Default root
    location / {
        return 200 'LibreClinica API Gateway Active';
        add_header Content-Type text/plain;
    }
}
