# =============================================================================
# LibreClinica Production Deployment - AWS Lightsail
# =============================================================================
# Server: 18.225.57.5 (Ohio, us-east-2a)
# 
# This docker-compose runs:
# 1. PostgreSQL database (port 5432 internal)
# 2. LibreClinica Java Core (port 8080 internal)
# 3. LibreClinica API (Node.js, port 3000 internal)
# 4. NGINX reverse proxy (ports 80, 443 exposed)
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:14-alpine
    container_name: libreclinica_db
    restart: always
    environment:
      POSTGRES_DB: libreclinica
      POSTGRES_USER: libreclinica
      POSTGRES_PASSWORD: ${DB_PASSWORD:-libreclinica_secure_2024}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - db_data:/var/lib/postgresql/data
      - db_backups:/backups
    networks:
      - lc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libreclinica -d libreclinica"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # LibreClinica Core (Java/Tomcat)
  # IMPORTANT: Uses patched WAR with working SOAP dependencies
  # ===========================================================================
  core:
    image: jaspersnel/libreclinica:latest
    container_name: libreclinica_core
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      dbType: postgres
      dbHost: postgres
      dbPort: 5432
      dbName: libreclinica
      dbUser: libreclinica
      dbPass: ${DB_PASSWORD:-libreclinica_secure_2024}
      sysURL: https://api.accuratrials.com/libreclinica
      supportURL: https://api.accuratrials.com
      filePath: /usr/local/tomcat/libreclinica.data/
      userAccountNotification: email
      adminEmail: admin@accuratrials.com
    volumes:
      - core_data:/usr/local/tomcat/libreclinica.data
      # Mount the patched WAR file with working SOAP
      - ./libreclinica-fix/LibreClinica-soap-fixed.war:/usr/local/tomcat/webapps/libreclinica.war:ro
    networks:
      - lc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/libreclinica/pages/login/login || exit 0"]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 240s

  # ===========================================================================
  # LibreClinica API (Node.js)
  # 21 CFR Part 11 Compliant REST API
  # ===========================================================================
  api:
    build:
      context: ./libreclinica-api
      dockerfile: Dockerfile
    image: libreclinica-api:latest
    container_name: libreclinica_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DEMO_MODE: "true"
      
      # Database Configuration
      LIBRECLINICA_DB_HOST: postgres
      LIBRECLINICA_DB_PORT: 5432
      LIBRECLINICA_DB_NAME: libreclinica
      LIBRECLINICA_DB_USER: libreclinica
      LIBRECLINICA_DB_PASSWORD: ${DB_PASSWORD:-libreclinica_secure_2024}
      
      # SOAP Configuration (for LibreClinica integration)
      LIBRECLINICA_SOAP_URL: http://core:8080/libreclinica-ws/ws
      SOAP_USERNAME: root
      # MD5 hash of password "12345678"
      SOAP_PASSWORD: 25d55ad283aa400af464c76d713c07ad
      DISABLE_SOAP: "false"
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-accuratrials_secure_jwt_secret_production_2024}
      JWT_EXPIRES_IN: 24h
      
      # CORS - Frontend URLs
      ALLOWED_ORIGINS: https://www.accuratrials.com,https://accuratrials.com,https://api.accuratrials.com,https://edc-real.vercel.app,https://edc-real-james-guis-projects.vercel.app,https://edc-real-git-main-james-guis-projects.vercel.app,http://localhost:4200,http://localhost:3000
      
      # Features
      ENABLE_EMAIL_NOTIFICATIONS: "true"
      ENABLE_SUBJECT_TRANSFERS: "true"
      ENABLE_ECONSENT: "true"
      ENABLE_EPRO: "true"
      ENABLE_RTSM: "true"
    networks:
      - lc_network

  # ===========================================================================
  # NGINX Reverse Proxy
  # Handles SSL termination and routing
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: libreclinica_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - core
    networks:
      - lc_network

  # ===========================================================================
  # Certbot for SSL Certificate Management
  # ===========================================================================
  certbot:
    image: certbot/certbot
    container_name: libreclinica_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  db_data:
  db_backups:
  core_data:

networks:
  lc_network:
    driver: bridge

